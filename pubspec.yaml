name: love_db
description: "Local vector database for Flutter apps with on-device SQLite storage, HNSW ANN search, and a simple collections API for managing and querying embeddings."
version: 1.0.0
homepage: https://github.com/dmorillas/love_db
repository: https://github.com/dmorillas/love_db
issue_tracker: https://github.com/dmorillas/love_db/issues
documentation: https://github.com/dmorillas/love_db

topics:
  - database
  - vector-database
  - embeddings
  - similarity-search
  - flutter

environment:
  sdk: ^3.7.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  local_hnsw: ^1.0.0
  nanoid: ^1.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.4
  path_provider_platform_interface: ^2.1.2

